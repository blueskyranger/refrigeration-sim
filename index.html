<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gas Circuit Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Gas Circuit Simulator</h1>

  <div class="controls">
    <button id="togglePump">Turn Pump On</button>
    <p id="flowDisplay">Flow: 0 L/min</p>
  </div>

  <div class="system">
  <div class="component reservoir" id="reservoirBox">
    <div>Reservoir</div>
    <div id="reservoirLevel">30 L</div>
  </div>

    <div class="pipe" id="pipe"></div>

    <div class="component pump" id="pumpBox">
      Pump
    </div>
  
  <div class="pipe right-pipe" id="rightPipe"></div>
  <div class="pipe bottom-pipe" id="bottomPipe"></div>
  <div class="pipe left-pipe" id="leftPipe"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
